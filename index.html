    key,Uint8Array.from(atob(CT),c=>c.charCodeAt(0)));
  const html=new TextDecoder().decode(pt);
  document.open();document.write("<!DOCTYPE html>",html);document.close();
}
document.getElementById("b").onclick=async()=>{try{await dec(document.getElementById("p").value)}
catch(e){document.getElementById("e").textContent="Неверный пароль"}};
