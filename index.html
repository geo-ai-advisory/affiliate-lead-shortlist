async function dec(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:Uint8Array.from(atob(SALT),c=>c.charCodeAt(0)),
    iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:Uint8Array.from(atob(IV),c=>c.charCodeAt(0))},
    key,Uint8Array.from(atob(CT),c=>c.charCodeAt(0)));
  const html=new TextDecoder().decode(pt);
  document.open();document.write("<!DOCTYPE html>",html);document.close();
}
